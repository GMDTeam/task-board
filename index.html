<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Task Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f10;
    --surface: #1a1a1c;
    --surface2: #222226;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0eff2;
    --muted: #888891;
    --faint: #555560;
    --accent: #7c6fef;
    --accent-soft: rgba(124,111,239,0.15);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }

  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: opacity .15s;
  }
  .btn-add:hover { opacity: .85; }
  .btn-add svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }

  /* FILTER BAR */
  .filterbar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--border2);
    color: var(--text);
    background: var(--surface2);
  }
  .filter-btn .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* BOARD */
  .board-wrap {
    flex: 1;
    overflow-x: auto;
    padding: 20px 24px 32px;
  }
  .board {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    min-width: max-content;
  }

  /* COLUMN */
  .col {
    width: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    transition: background .15s;
  }
  .col.drag-over {
    background: var(--surface2);
    border-color: var(--accent);
  }
  .col-head {
    padding: 12px 12px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .col-label {
    display: flex; align-items: center; gap: 7px;
  }
  .stage-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .col-title {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .col-count {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 7px;
    color: var(--faint);
    font-weight: 500;
  }
  .col-cards {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  /* CARD */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 11px;
    cursor: grab;
    transition: border-color .15s, transform .1s;
    user-select: none;
  }
  .card:hover { border-color: var(--border2); }
  .card.dragging { opacity: .35; transform: scale(.97); cursor: grabbing; }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .avatars { display: flex; }
  .avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--surface2);
    margin-left: -5px;
    flex-shrink: 0;
  }
  .avatars .avatar:first-child { margin-left: 0; }
  .card-meta {
    display: flex; align-items: center; gap: 8px;
  }
  .meta-item {
    font-size: 11px;
    color: var(--faint);
    display: flex; align-items: center; gap: 3px;
  }
  .meta-item svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* ADD BUTTON */
  .add-task-btn {
    margin: 2px 10px 10px;
    width: calc(100% - 20px);
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--faint);
    font-size: 12px;
    padding: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: all .15s;
  }
  .add-task-btn:hover {
    border-color: var(--border2);
    color: var(--muted);
    background: var(--surface2);
  }
  .add-task-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  /* EMPTY STATE */
  .empty-col {
    font-size: 12px;
    color: var(--faint);
    text-align: center;
    padding: 16px 8px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px;
    width: 420px;
    max-width: calc(100vw - 32px);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 9px 11px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--border2); }
  .btn-submit {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: var(--radius-sm);
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    transition: transform .25s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 14px;
    width: 100%;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
    </div>
    <span class="logo-name">Task Board</span>
    <span class="logo-sub">· getmattsdeals.com</span>
  </div>
  <div class="header-right">
    <button class="btn-add" onclick="openModal()">
      <svg viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Add task
    </button>
  </div>
</header>

<div class="filterbar">
  <span class="filter-label">Assignee</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="Rishil" onclick="setFilter('Rishil', this)">
    <span class="dot" style="background:#7c6fef"></span>Rishil
  </button>
  <button class="filter-btn" data-filter="Poncho" onclick="setFilter('Poncho', this)">
    <span class="dot" style="background:#2db98a"></span>Poncho
  </button>
  <button class="filter-btn" data-filter="Rayshell" onclick="setFilter('Rayshell', this)">
    <span class="dot" style="background:#e06b6b"></span>Rayshell
  </button>
  <button class="filter-btn" data-filter="Matt" onclick="setFilter('Matt', this)">
    <span class="dot" style="background:#e0a040"></span>Matt
  </button>
</div>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="loading"><div class="spinner"></div>Loading tasks…</div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add new task</h2>
    <div class="field">
      <label>Task title</label>
      <input type="text" id="inp-title" placeholder="e.g. Summer sale banner copy" />
    </div>
    <div class="field">
      <label>Stage</label>
      <select id="inp-stage">
        <option value="idea">Idea</option>
        <option value="creating">Creating storefront</option>
        <option value="ready-cp">Ready for content plan</option>
        <option value="cp-ready">Content plan ready</option>
        <option value="approved">Approved</option>
        <option value="production">In production</option>
        <option value="scheduled">Scheduled</option>
      </select>
    </div>
    <div class="field">
      <label>Assign to</label>
      <select id="inp-assignee">
        <option value="">— Unassigned —</option>
        <option value="Rishil">Rishil</option>
        <option value="Poncho">Poncho</option>
        <option value="Rayshell">Rayshell</option>
        <option value="Matt">Matt</option>
      </select>
    </div>
    <div class="field">
      <label>Due date (optional)</label>
      <input type="date" id="inp-due" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="btn-submit" onclick="submitTask()">Add task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxLfeSkyk2WqmHRpzDk_HihpVpzOreKnhFKmYf8nJG5hFX2px7hD1FO7xABiCEJlwMV/exec";

const STAGES = [
  { id: "idea",       label: "Idea",                    color: "#888891" },
  { id: "creating",   label: "Creating storefront",     color: "#7c6fef" },
  { id: "ready-cp",   label: "Ready for content plan",  color: "#378ADD" },
  { id: "cp-ready",   label: "Content plan ready",      color: "#EF9F27" },
  { id: "approved",   label: "Approved",                color: "#2db98a" },
  { id: "production", label: "In production",           color: "#D4537E" },
  { id: "scheduled",  label: "Scheduled",               color: "#639922" },
];

const AVATARS = {
  Rishil:   { color: "#7c6fef", bg: "rgba(124,111,239,.25)" },
  Poncho:   { color: "#2db98a", bg: "rgba(45,185,138,.25)" },
  Rayshell: { color: "#e06b6b", bg: "rgba(224,107,107,.25)" },
  Matt:     { color: "#e0a040", bg: "rgba(224,160,64,.25)" },
};

let tasks = [];
let activeFilter = "all";
let dragId = null;
let defaultStage = "idea";

async function loadTasks() {
  try {
    const res = await fetch(`${API}?action=getTasks`);
    const data = await res.json();
    tasks = data.map(r => ({
      id: String(r.ID),
      title: r.Title,
      stage: r.Stage,
      assignee: r.Assignee || "",
      subtasks: r.Subtasks || 0,
      due: r["Due Date"] || "",
    }));
  } catch(e) {
    tasks = [];
  }
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  const filtered = activeFilter === "all"
    ? tasks
    : tasks.filter(t => t.assignee === activeFilter);

  STAGES.forEach(stage => {
    const col = document.createElement("div");
    col.className = "col";
    col.dataset.stage = stage.id;

    const stageTasks = filtered.filter(t => t.stage === stage.id);

    col.innerHTML = `
      <div class="col-head">
        <div class="col-label">
          <span class="stage-dot" style="background:${stage.color}"></span>
          <span class="col-title">${stage.label}</span>
        </div>
        <span class="col-count">${stageTasks.length}</span>
      </div>
      <div class="col-cards" id="cards-${stage.id}"></div>
      <button class="add-task-btn" onclick="openModal('${stage.id}')">
        <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Add task
      </button>`;

    const cardsDiv = col.querySelector(`#cards-${stage.id}`);

    if (stageTasks.length === 0) {
      cardsDiv.innerHTML = `<div class="empty-col">No tasks</div>`;
    } else {
      stageTasks.forEach(task => {
        const card = createCard(task);
        cardsDiv.appendChild(card);
      });
    }

    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("drag-over"); });
    col.addEventListener("dragleave", e => { if (!col.contains(e.relatedTarget)) col.classList.remove("drag-over"); });
    col.addEventListener("drop", async e => {
      e.preventDefault();
      col.classList.remove("drag-over");
      if (dragId === null) return;
      const task = tasks.find(t => t.id === dragId);
      if (!task || task.stage === stage.id) return;
      task.stage = stage.id;
      renderBoard();
      try {
        await fetch(API, {
          method: "POST",
          body: JSON.stringify({ action: "updateStage", id: dragId, stage: stage.id }),
        });
        showToast("Stage updated ✓");
      } catch(e) { showToast("Saved locally — sync failed"); }
    });

    board.appendChild(col);
  });
}

function createCard(task) {
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;
  card.dataset.id = task.id;

  const av = task.assignee && AVATARS[task.assignee];
  const avatarHTML = av
    ? `<div class="avatar" style="background:${av.bg};color:${av.color}">${task.assignee.slice(0,2).toUpperCase()}</div>`
    : `<div class="avatar" style="background:rgba(255,255,255,.08);color:#666">?</div>`;

  const dueHTML = task.due
    ? `<span class="meta-item"><svg viewBox="0 0 12 12"><rect x="1" y="2" width="10" height="9" rx="1.5"/><line x1="4" y1="1" x2="4" y2="3"/><line x1="8" y1="1" x2="8" y2="3"/></svg>${formatDate(task.due)}</span>`
    : "";

  const subHTML = task.subtasks > 0
    ? `<span class="meta-item"><svg viewBox="0 0 12 12"><line x1="3" y1="4" x2="9" y2="4"/><line x1="3" y1="7" x2="7" y2="7"/><line x1="3" y1="10" x2="5" y2="10"/></svg>${task.subtasks}</span>`
    : "";

  card.innerHTML = `
    <div class="card-title">${task.title}</div>
    <div class="card-footer">
      <div class="avatars">${avatarHTML}</div>
      <div class="card-meta">${dueHTML}${subHTML}</div>
    </div>`;

  card.addEventListener("dragstart", () => {
    dragId = task.id;
    setTimeout(() => card.classList.add("dragging"), 0);
  });
  card.addEventListener("dragend", () => {
    card.classList.remove("dragging");
    dragId = null;
    document.querySelectorAll(".col").forEach(c => c.classList.remove("drag-over"));
  });

  return card;
}

function formatDate(d) {
  if (!d) return "";
  try {
    const date = new Date(d);
    return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  } catch { return d; }
}

function setFilter(name, btn) {
  activeFilter = name;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderBoard();
}

function openModal(stageId) {
  defaultStage = stageId || "idea";
  document.getElementById("inp-stage").value = defaultStage;
  document.getElementById("inp-title").value = "";
  document.getElementById("inp-assignee").value = "";
  document.getElementById("inp-due").value = "";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("inp-title").focus(), 50);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

async function submitTask() {
  const title = document.getElementById("inp-title").value.trim();
  if (!title) { document.getElementById("inp-title").focus(); return; }

  const assignee = document.getElementById("inp-assignee").value;
  const stage = document.getElementById("inp-stage").value;
  const due = document.getElementById("inp-due").value;

  const btn = document.getElementById("btn-submit");
  btn.disabled = true;
  btn.textContent = "Adding…";

  try {
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "addTask", title, stage, assignee, due, subtasks: 0 }),
    });
    closeModal();
    showToast(assignee ? `Task added — ${assignee} notified ✓` : "Task added ✓");
    await loadTasks();
  } catch(e) {
    showToast("Could not save — check connection");
  }

  btn.disabled = false;
  btn.textContent = "Add task";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

loadTasks();
</script>
</body>
</html>

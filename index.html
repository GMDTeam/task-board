<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Task Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f10;
    --surface: #1a1a1c;
    --surface2: #222226;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0eff2;
    --muted: #888891;
    --faint: #555560;
    --accent: #7c6fef;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-archive { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; }
  .btn-archive:hover { color: var(--text); border-color: var(--border2); }
  .btn-archive svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s; }
  .btn-add:hover { opacity: .85; }
  .btn-add svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }
  .filterbar { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .filter-btn { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 12px; padding: 4px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
  .board-wrap { flex: 1; overflow-x: auto; padding: 20px 24px 32px; }
  .board { display: flex; gap: 14px; align-items: flex-start; min-width: max-content; }
  .col { width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; transition: background .15s; }
  .col.drag-over { background: var(--surface2); border-color: var(--accent); }
  .col-head { padding: 12px 12px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .col-label { display: flex; align-items: center; gap: 7px; }
  .stage-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .col-title { font-size: 11.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .col-count { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 7px; color: var(--faint); font-weight: 500; }
  .col-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 11px; cursor: pointer; transition: border-color .15s, transform .1s; user-select: none; }
  .card:hover { border-color: var(--border2); }
  .card.dragging { opacity: .35; transform: scale(.97); cursor: grabbing; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .card-link { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--accent); text-decoration: none; margin-bottom: 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100%; }
  .card-link:hover { text-decoration: underline; }
  .card-link svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .avatars { display: flex; }
  .avatar { width: 22px; height: 22px; border-radius: 50%; font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 2px solid var(--surface2); margin-left: -5px; flex-shrink: 0; }
  .avatars .avatar:first-child { margin-left: 0; }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .meta-item { font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 3px; }
  .meta-item svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }
  .add-task-btn { margin: 2px 10px 10px; width: calc(100% - 20px); background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--faint); font-size: 12px; padding: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all .15s; }
  .add-task-btn:hover { border-color: var(--border2); color: var(--muted); background: var(--surface2); }
  .add-task-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }
  .empty-col { font-size: 12px; color: var(--faint); text-align: center; padding: 16px 8px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; width: 440px; max-width: calc(100vw - 32px); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 9px 11px; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .field .hint { font-size: 11px; color: var(--faint); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: space-between; margin-top: 20px; align-items: center; }
  .modal-actions-right { display: flex; gap: 8px; }
  .btn-cancel { background: none; border: 1px solid var(--border2); color: var(--muted); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { color: var(--text); }
  .btn-submit { background: var(--accent); border: none; color: white; border-radius: var(--radius-sm); padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
  .btn-delete { background: none; border: 1px solid rgba(224,107,107,.3); color: #e06b6b; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all .15s; }
  .btn-delete:hover { background: rgba(224,107,107,.1); }

  /* ARCHIVE PANEL */
  .archive-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: flex-end; justify-content: center; }
  .archive-overlay.open { display: flex; }
  .archive-panel { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px 14px 0 0; width: 100%; max-width: 860px; max-height: 70vh; display: flex; flex-direction: column; }
  .archive-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .archive-header h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .archive-header h2 svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; }
  .archive-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px; }
  .archive-close:hover { color: var(--text); }
  .archive-body { overflow-y: auto; padding: 16px 24px 24px; }
  .archive-empty { text-align: center; padding: 40px; color: var(--faint); font-size: 14px; }
  .archive-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .archive-item-left { display: flex; flex-direction: column; gap: 4px; }
  .archive-item-title { font-size: 13px; font-weight: 500; color: var(--muted); }
  .archive-item-meta { font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 10px; }
  .archive-item-right { display: flex; align-items: center; gap: 8px; }
  .archive-link { font-size: 11px; color: var(--accent); text-decoration: none; }
  .archive-link:hover { text-decoration: underline; }
  .archived-badge { font-size: 10px; background: rgba(99,153,34,.15); color: #639922; border-radius: 20px; padding: 2px 8px; font-weight: 500; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; color: var(--text); transition: transform .25s ease; z-index: 200; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; width: 100%; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
    </div>
    <span class="logo-name">Task Board</span>
    <span class="logo-sub">· getmattsdeals.com</span>
  </div>
  <div class="header-right">
    <button class="btn-archive" onclick="openArchive()">
      <svg viewBox="0 0 14 14"><rect x="1" y="3" width="12" height="9" rx="1.5"/><line x1="1" y1="6" x2="13" y2="6"/><line x1="5" y1="2" x2="5" y2="4"/><line x1="9" y1="2" x2="9" y2="4"/></svg>
      Archive
    </button>
    <button class="btn-add" onclick="openModal()">
      <svg viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Add task
    </button>
  </div>
</header>

<div class="filterbar">
  <span class="filter-label">Assignee</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="Matt" onclick="setFilter('Matt', this)">
    <span class="dot" style="background:#e0a040"></span>Matt
  </button>
  <button class="filter-btn" data-filter="Sarah" onclick="setFilter('Sarah', this)">
    <span class="dot" style="background:#2db98a"></span>Sarah
  </button>
  <button class="filter-btn" data-filter="Rayshell" onclick="setFilter('Rayshell', this)">
    <span class="dot" style="background:#e06b6b"></span>Rayshell
  </button>
</div>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="loading"><div class="spinner"></div>Loading tasks…</div>
  </div>
</div>

<!-- ADD / EDIT TASK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add new task</h2>
    <div class="field">
      <label>Task title</label>
      <input type="text" id="inp-title" placeholder="e.g. Summer sale banner copy" />
    </div>
    <div class="field">
      <label>Stage</label>
      <select id="inp-stage">
        <option value="idea">Idea</option>
        <option value="building">Building</option>
        <option value="published">Published</option>
        <option value="email-ready">Email Ready</option>
        <option value="email-sent">Email Sent</option>
        <option value="social-pending">Social Pending</option>
        <option value="complete">Complete</option>
      </select>
    </div>
    <div class="field">
      <label>Assign to</label>
      <select id="inp-assignee">
        <option value="">— Unassigned —</option>
        <option value="Matt">Matt</option>
        <option value="Sarah">Sarah</option>
        <option value="Rayshell">Rayshell</option>
      </select>
    </div>
    <div class="field">
      <label>Due date (optional)</label>
      <input type="date" id="inp-due" />
    </div>
    <div class="field">
      <label>Storefront link (optional)</label>
      <input type="url" id="inp-link" placeholder="https://amazon.com/... or https://walmart.com/..." />
      <div class="hint">Paste the Amazon or Walmart storefront URL — you can update this anytime.</div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deleteTask()" style="display:none">Delete task</button>
      <div class="modal-actions-right">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" id="btn-submit" onclick="submitTask()">Add task</button>
      </div>
    </div>
  </div>
</div>

<!-- ARCHIVE PANEL -->
<div class="archive-overlay" id="archive-overlay">
  <div class="archive-panel">
    <div class="archive-header">
      <h2>
        <svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="11" rx="1.5"/><line x1="1" y1="7" x2="15" y2="7"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/></svg>
        Archived tasks
      </h2>
      <button class="archive-close" onclick="closeArchive()">×</button>
    </div>
    <div class="archive-body" id="archive-body">
      <div class="archive-empty">Loading…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzlHebZRwJIQ40RmB8K6S6tjqgV328TYqAHkFSu5nlUpg3ScglRDmMi2i0MFQ54QLcl/exec";

const STAGES = [
  { id: "idea",           label: "Idea",           color: "#888891" },
  { id: "building",       label: "Building",        color: "#7c6fef" },
  { id: "published",      label: "Published",       color: "#378ADD" },
  { id: "email-ready",    label: "Email ready",     color: "#EF9F27" },
  { id: "email-sent",     label: "Email sent",      color: "#2db98a" },
  { id: "social-pending", label: "Social pending",  color: "#D4537E" },
  { id: "complete",       label: "Complete",        color: "#639922" },
];

const AVATARS = {
  Matt:     { color: "#e0a040", bg: "rgba(224,160,64,.25)" },
  Sarah:    { color: "#2db98a", bg: "rgba(45,185,138,.25)" },
  Rayshell: { color: "#e06b6b", bg: "rgba(224,107,107,.25)" },
};

let tasks = [];
let archivedTasks = [];
let activeFilter = "all";
let dragId = null;
let editingId = null;

async function loadTasks() {
  try {
    const res = await fetch(`${API}?action=getTasks`);
    const data = await res.json();
    tasks = [];
    archivedTasks = [];
    data.forEach(r => {
      const t = {
        id: String(r.ID),
        title: r.Title,
        stage: r.Stage,
        assignee: r.Assignee || "",
        subtasks: r.Subtasks || 0,
        due: r["Due Date"] || "",
        link: r.Link || "",
        completedAt: r.CompletedAt || "",
        archived: r.Archived === "true" || r.Archived === true,
      };
      if (t.archived) archivedTasks.push(t);
      else tasks.push(t);
    });
  } catch(e) { tasks = []; archivedTasks = []; }
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  const filtered = activeFilter === "all" ? tasks : tasks.filter(t => t.assignee === activeFilter);

  STAGES.forEach(stage => {
    const col = document.createElement("div");
    col.className = "col";
    col.dataset.stage = stage.id;
    const stageTasks = filtered.filter(t => t.stage === stage.id);

    col.innerHTML = `
      <div class="col-head">
        <div class="col-label">
          <span class="stage-dot" style="background:${stage.color}"></span>
          <span class="col-title">${stage.label}</span>
        </div>
        <span class="col-count">${stageTasks.length}</span>
      </div>
      <div class="col-cards" id="cards-${stage.id}"></div>
      <button class="add-task-btn" onclick="openModal('${stage.id}')">
        <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Add task
      </button>`;

    const cardsDiv = col.querySelector(`#cards-${stage.id}`);
    if (stageTasks.length === 0) {
      cardsDiv.innerHTML = `<div class="empty-col">No tasks</div>`;
    } else {
      stageTasks.forEach(task => cardsDiv.appendChild(createCard(task)));
    }

    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("drag-over"); });
    col.addEventListener("dragleave", e => { if (!col.contains(e.relatedTarget)) col.classList.remove("drag-over"); });
    col.addEventListener("drop", async e => {
      e.preventDefault();
      col.classList.remove("drag-over");
      if (dragId === null) return;
      const task = tasks.find(t => t.id === dragId);
      if (!task || task.stage === stage.id) return;
      const completedAt = stage.id === "complete" ? new Date().toISOString() : "";
      task.stage = stage.id;
      task.completedAt = completedAt;
      renderBoard();
      try {
        await fetch(API, { method: "POST", body: JSON.stringify({ action: "updateStage", id: dragId, stage: stage.id, completedAt }) });
        showToast("Stage updated ✓");
      } catch(e) { showToast("Saved locally — sync failed"); }
    });

    board.appendChild(col);
  });
}

function createCard(task) {
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;
  card.dataset.id = task.id;

  const av = task.assignee && AVATARS[task.assignee];
  const avatarHTML = av
    ? `<div class="avatar" style="background:${av.bg};color:${av.color}">${task.assignee.slice(0,2).toUpperCase()}</div>`
    : `<div class="avatar" style="background:rgba(255,255,255,.08);color:#666">?</div>`;

  const dueHTML = task.due
    ? `<span class="meta-item"><svg viewBox="0 0 12 12"><rect x="1" y="2" width="10" height="9" rx="1.5"/><line x1="4" y1="1" x2="4" y2="3"/><line x1="8" y1="1" x2="8" y2="3"/></svg>${formatDate(task.due)}</span>`
    : "";

  const linkHTML = task.link
    ? `<a class="card-link" href="${task.link}" target="_blank" onclick="event.stopPropagation()">
        <svg viewBox="0 0 12 12"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7"/><path d="M8 1h3v3"/><line x1="11" y1="1" x2="5" y2="7"/></svg>
        ${getDomain(task.link)}
      </a>`
    : "";

  card.innerHTML = `
    <div class="card-title">${task.title}</div>
    ${linkHTML}
    <div class="card-footer">
      <div class="avatars">${avatarHTML}</div>
      <div class="card-meta">${dueHTML}</div>
    </div>`;

  card.addEventListener("click", () => openEditModal(task.id));
  card.addEventListener("dragstart", e => {
    dragId = task.id;
    setTimeout(() => card.classList.add("dragging"), 0);
  });
  card.addEventListener("dragend", () => {
    card.classList.remove("dragging");
    dragId = null;
    document.querySelectorAll(".col").forEach(c => c.classList.remove("drag-over"));
  });

  return card;
}

function getDomain(url) {
  try {
    const d = new URL(url).hostname.replace("www.", "");
    return d.length > 22 ? d.slice(0, 22) + "…" : d;
  } catch { return "View link"; }
}

function formatDate(d) {
  if (!d) return "";
  try { return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
  catch { return d; }
}

function setFilter(name, btn) {
  activeFilter = name;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderBoard();
}

function openModal(stageId) {
  editingId = null;
  document.getElementById("modal-title").textContent = "Add new task";
  document.getElementById("btn-submit").textContent = "Add task";
  document.getElementById("btn-delete").style.display = "none";
  document.getElementById("inp-stage").value = stageId || "idea";
  document.getElementById("inp-title").value = "";
  document.getElementById("inp-assignee").value = "";
  document.getElementById("inp-due").value = "";
  document.getElementById("inp-link").value = "";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("inp-title").focus(), 50);
}

function openEditModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  editingId = taskId;
  document.getElementById("modal-title").textContent = "Edit task";
  document.getElementById("btn-submit").textContent = "Save changes";
  document.getElementById("btn-delete").style.display = "block";
  document.getElementById("inp-title").value = task.title;
  document.getElementById("inp-stage").value = task.stage;
  document.getElementById("inp-assignee").value = task.assignee;
  document.getElementById("inp-due").value = task.due;
  document.getElementById("inp-link").value = task.link || "";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("inp-title").focus(), 50);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  editingId = null;
}

async function submitTask() {
  const title = document.getElementById("inp-title").value.trim();
  if (!title) { document.getElementById("inp-title").focus(); return; }

  const assignee = document.getElementById("inp-assignee").value;
  const stage    = document.getElementById("inp-stage").value;
  const due      = document.getElementById("inp-due").value;
  const link     = document.getElementById("inp-link").value.trim();
  const completedAt = stage === "complete" ? new Date().toISOString() : "";

  const btn = document.getElementById("btn-submit");
  btn.disabled = true;
  btn.textContent = "Saving…";

  try {
    if (editingId) {
      const task = tasks.find(t => t.id === editingId);
      if (task) { task.link = link; task.title = title; task.assignee = assignee; task.due = due; task.stage = stage; task.completedAt = completedAt; }
      await fetch(API, { method: "POST", body: JSON.stringify({ action: "updateTask", id: editingId, title, stage, assignee, due, link, completedAt }) });
      showToast("Task updated ✓");
    } else {
      await fetch(API, { method: "POST", body: JSON.stringify({ action: "addTask", title, stage, assignee, due, link, subtasks: 0, completedAt }) });
      showToast(assignee ? `Task added — ${assignee} notified ✓` : "Task added ✓");
    }
    closeModal();
    await loadTasks();
  } catch(e) { showToast("Could not save — check connection"); }

  btn.disabled = false;
  btn.textContent = editingId ? "Save changes" : "Add task";
}

async function deleteTask() {
  if (!editingId) return;
  if (!confirm("Delete this task? This cannot be undone.")) return;
  try {
    await fetch(API, { method: "POST", body: JSON.stringify({ action: "deleteTask", id: editingId }) });
    tasks = tasks.filter(t => t.id !== editingId);
    closeModal();
    renderBoard();
    showToast("Task deleted");
  } catch(e) { showToast("Could not delete — check connection"); }
}

function openArchive() {
  document.getElementById("archive-overlay").classList.add("open");
  renderArchive();
}

function closeArchive() {
  document.getElementById("archive-overlay").classList.remove("open");
}

function renderArchive() {
  const body = document.getElementById("archive-body");
  if (archivedTasks.length === 0) {
    body.innerHTML = `<div class="archive-empty">No archived tasks yet.<br>Completed tasks move here automatically after 2 days.</div>`;
    return;
  }
  body.innerHTML = archivedTasks.map(t => {
    const av = t.assignee && AVATARS[t.assignee];
    const avHTML = av ? `<span style="color:${av.color}">${t.assignee}</span>` : "Unassigned";
    const linkHTML = t.link ? `<a class="archive-link" href="${t.link}" target="_blank">${getDomain(t.link)}</a>` : "";
    const archivedDate = t.completedAt ? formatDate(t.completedAt) : "";
    return `<div class="archive-item">
      <div class="archive-item-left">
        <div class="archive-item-title">${t.title}</div>
        <div class="archive-item-meta">
          ${avHTML}
          ${archivedDate ? `· Completed ${archivedDate}` : ""}
        </div>
      </div>
      <div class="archive-item-right">
        ${linkHTML}
        <span class="archived-badge">Archived</span>
      </div>
    </div>`;
  }).join("");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

document.getElementById("modal").addEventListener("click", e => { if (e.target === document.getElementById("modal")) closeModal(); });
document.getElementById("archive-overlay").addEventListener("click", e => { if (e.target === document.getElementById("archive-overlay")) closeArchive(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") { closeModal(); closeArchive(); } });

loadTasks();
</script>
</body>
</html>
